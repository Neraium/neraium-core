[project]
name = "neraium-core"
version = "0.1.0"
description = "Systemic Infrastructure Intelligence engine"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "pandas",
    "scipy"
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff"
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"


[tool.pytest.ini_options]
pythonpath = ["."]
