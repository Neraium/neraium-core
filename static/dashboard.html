.container {
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  margin: 0 0 8px 0;
  font-size: 32px;
}

.subtitle {
  color: #94a3b8;
  margin-bottom: 20px;
}

.row {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

.card {
  grid-column: span 12;
  background: #111827;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 16px;
}

.span-4 { grid-column: span 4; }
.span-6 { grid-column: span 6; }

@media (max-width: 900px) {
  .span-4, .span-6 {
    grid-column: span 12;
  }
}

.metric {
  font-size: 36px;
  font-weight: bold;
  margin: 8px 0;
}

.ok { color: #22c55e; }
.bad { color: #ef4444; }

.chart-wrap {
  background: white;
  border-radius: 10px;
  padding: 10px;
}

canvas {
  width: 100% !important;
  height: 260px !important;
}

pre {
  background: #020617;
  color: #dbeafe;
  border-radius: 10px;
  padding: 12px;
  min-height: 180px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 12px;
}

ul {
  max-height: 220px;
  overflow: auto;
  padding-left: 20px;
}

.status-indicator {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}

.status-ok {
  background-color: #22c55e;
}

.status-bad {
  background-color: #ef4444;
}

  </div>

  <script>
    const cpuChart = new Chart(document.getElementById("cpuChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{ 
          label: "CPU", 
          data: [], 
          borderWidth: 2,
          borderColor: "#3b82f6",
          backgroundColor: "rgba(59, 130, 246, 0.1)",
          tension: 0.4
        }]
      },
      options: { 
        responsive: true, 
        animation: false,
        plugins: { legend: { display: false } }
      }
    });

    const memChart = new Chart(document.getElementById("memChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{ 
          label: "Memory", 
          data: [], 
          borderWidth: 2,
          borderColor: "#8b5cf6",
          backgroundColor: "rgba(139, 92, 246, 0.1)",
          tension: 0.4
        }]
      },
      options: { 
        responsive: true, 
        animation: false,
        plugins: { legend: { display: false } }
      }
    });

    const scoreChart = new Chart(document.getElementById("scoreChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{ 
          label: "Score", 
          data: [], 
          borderWidth: 2,
          borderColor: "#ec4899",
          backgroundColor: "rgba(236, 72, 153, 0.1)",
          tension: 0.4
        }]
      },
      options: { 
        responsive: true, 
        animation: false,
        plugins: { legend: { display: false } }
      }
    });

    const relationshipChart = new Chart(document.getElementById("relationshipChart"), {
      type: "scatter",
      data: {
        datasets: [
          { 
            label: "Normal", 
            data: [],
            backgroundColor: "rgba(34, 197, 94, 0.6)",
            borderColor: "#22c55e"
          },
          { 
            label: "Anomaly", 
            data: [],
            backgroundColor: "rgba(239, 68, 68, 0.6)",
            borderColor: "#ef4444"
          }
        ]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: { min: 0, max: 100, title: { display: true, text: "CPU %" } },
          y: { min: 0, max: 100, title: { display: true, text: "Memory %" } }
        }
      }
    });

    // Mock data store
    let mockEvents = [];

    function generateMockEvent() {
      return {
        timestamp: new Date().toISOString(),
        status: Math.random() > 0.85 ? "anomaly" : "normal",
        score: Math.round(Math.random() * 100),
        signals: {
          cpu_usage: Math.round((20 + Math.random() * 60) * 10) / 10,
          memory_usage: Math.round((30 + Math.random() * 50) * 10) / 10
        }
      };
    }

    // Initialize mock data
    for (let i = 0; i < 15; i++) {
      mockEvents.push(generateMockEvent());
    }

    async function getJson(url) {
      // Use mock data instead of fetching
      if (url === "/events") {
        return { events: mockEvents };
      } else if (url === "/events/anomalies") {
        return { events: mockEvents.filter(e => e.status === "anomaly") };
      } else if (url === "/events/latest") {
        if (!mockEvents.length) throw new Error("No events");
        return mockEvents[mockEvents.length - 1];
      }
      throw new Error("Unknown endpoint: " + url);
    }

    function shortTime(ts) {
      try {
        return new Date(ts).toLocaleTimeString();
      } catch {
        return ts;
      }
    }

    async function refreshDashboard() {
      try {
        // Add new mock event every refresh
        if (mockEvents.length > 50) mockEvents.shift();
        mockEvents.push(generateMockEvent());

        const eventsData = await getJson("/events");
        const anomalyData = await getJson("/events/anomalies");

        let latestData;
        try {
          latestData = await getJson("/events/latest");
        } catch {
          latestData = { error: "no events" };
        }

        const events = eventsData.events || [];
        const anomalies = anomalyData.events || [];

        document.getElementById("total-events").textContent = events.length;
        document.getElementById("total-anomalies").textContent = anomalies.length;

        if (!latestData.error) {
          const statusEl = document.getElementById("status-text");
          statusEl.textContent = latestData.status || "unknown";
          const indicator = document.querySelector(".status-indicator");
          indicator.className = "status-indicator " + (latestData.status === "anomaly" ? "status-bad" : "status-ok");

          document.getElementById("latest-score").textContent =
            "Score: " + String(latestData.score ?? "--");

          document.getElementById("latest-event").textContent =
            JSON.stringify(latestData, null, 2);
        } else {
          document.getElementById("status-text").textContent = "No data";
          document.querySelector(".status-indicator").className = "status-indicator";
          document.getElementById("latest-score").textContent = "Score: --";
          document.getElementById("latest-event").textContent = "No events yet";
        }

        const labels = events.map(e => shortTime(e.timestamp));
        const cpu = events.map(e => e.signals?.cpu_usage ?? 0);
        const mem = events.map(e => e.signals?.memory_usage ?? 0);
        const score = events.map(e => e.score ?? 0);

        cpuChart.data.labels = labels;
        cpuChart.data.datasets[0].data = cpu;
        cpuChart.update();

        memChart.data.labels = labels;
        memChart.data.datasets[0].data = mem;
        memChart.update();

        scoreChart.data.labels = labels;
        scoreChart.data.datasets[0].data = score;
        scoreChart.update();

        relationshipChart.data.datasets[0].data = events
          .filter(e => e.status !== "anomaly")
          .map(e => ({
            x: e.signals?.cpu_usage ?? 0,
            y: e.signals?.memory_usage ?? 0
          }));

        relationshipChart.data.datasets[1].data = events
          .filter(e => e.status === "anomaly")
          .map(e => ({
            x: e.signals?.cpu_usage ?? 0,
            y: e.signals?.memory_usage ?? 0
          }));

        relationshipChart.update();

        const list = document.getElementById("anomaly-list");
        list.innerHTML = "";

        if (!anomalies.length) {
          const li = document.createElement("li");
          li.textContent = "No anomalies yet";
          list.appendChild(li);
        } else {
          anomalies.slice().reverse().slice(0, 10).forEach(e => {
            const li = document.createElement("li");
            li.textContent = shortTime(e.timestamp) + " score=" + e.score;
            list.appendChild(li);
          });
        }
      } catch (err) {
        document.getElementById("latest-event").textContent =
          "Dashboard error: " + err.message;
        console.error(err);
      }
    }

    refreshDashboard();
    setInterval(refreshDashboard, 2000);
  </script>

</body>
