<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neraium Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .card {
      grid-column: span 12;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
    }

    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }

    @media (max-width: 900px) {
      .span-4, .span-6 {
        grid-column: span 12;
      }
    }

    .metric {
      font-size: 36px;
      font-weight: bold;
      margin: 8px 0;
    }

    .ok { color: #22c55e; }
    .bad { color: #ef4444; }

    .chart-wrap {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    canvas {
      width: 100% !important;
      height: 260px !important;
    }

    pre {
      background: #020617;
      color: #dbeafe;
      border-radius: 10px;
      padding: 12px;
      min-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    ul {
      max-height: 220px;
      overflow: auto;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Neraium Dashboard</h1>
    <div class="subtitle">Live telemetry and drift monitoring</div>

    <div class="row">
      <div class="card span-4">
        <h2>Status</h2>
        <div id="latest-status" class="metric">Loading...</div>
        <div id="latest-score">Score: --</div>
      </div>

      <div class="card span-4">
        <h2>Total Events</h2>
        <div id="total-events" class="metric">0</div>
      </div>

      <div class="card span-4">
        <h2>Total Anomalies</h2>
        <div id="total-anomalies" class="metric">0</div>
      </div>
    </div>

    <div class="row">
      <div class="card span-6">
        <h2>CPU Usage</h2>
        <div class="chart-wrap">
          <canvas id="cpuChart"></canvas>
        </div>
      </div>

      <div class="card span-6">
        <h2>Memory Usage</h2>
        <div class="chart-wrap">
          <canvas id="memChart"></canvas>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="card span-6">
        <h2>Score</h2>
        <div class="chart-wrap">
          <canvas id="scoreChart"></canvas>
        </div>
      </div>

      <div class="card span-6">
        <h2>Relationship</h2>
        <div class="chart-wrap">
          <canvas id="relationshipChart"></canvas>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="card span-6">
        <h2>Latest Event</h2>
        <pre id="latest-event">Loading...</pre>
      </div>

      <div class="card span-6">
        <h2>Anomaly Events</h2>
        <ul id="anomaly-list"></ul>
      </div>
    </div>
  </div>

  <script>
    const cpuChart = new Chart(document.getElementById("cpuChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{ label: "CPU", data: [], borderWidth: 2 }]
      },
      options: { responsive: true, animation: false }
    });

    const memChart = new Chart(document.getElementById("memChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{ label: "Memory", data: [], borderWidth: 2 }]
      },
      options: { responsive: true, animation: false }
    });

    const scoreChart = new Chart(document.getElementById("scoreChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{ label: "Score", data: [], borderWidth: 2 }]
      },
      options: { responsive: true, animation: false }
    });

    const relationshipChart = new Chart(document.getElementById("relationshipChart"), {
      type: "scatter",
      data: {
        datasets: [
          { label: "Normal", data: [] },
          { label: "Anomaly", data: [] }
        ]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: { min: 0, max: 100, title: { display: true, text: "CPU" } },
          y: { min: 0, max: 100, title: { display: true, text: "Memory" } }
        }
      }
    });

    async function getJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(url + " -> " + res.status);
      }
      return await res.json();
    }

    function shortTime(ts) {
      try {
        return new Date(ts).toLocaleTimeString();
      } catch {
        return ts;
      }
    }

    async function refreshDashboard() {
      try {
        const eventsData = await getJson("/events");
        const anomalyData = await getJson("/events/anomalies");

        let latestData;
        try {
          latestData = await getJson("/events/latest");
        } catch {
          latestData = { error: "no events" };
        }

        const events = eventsData.events || [];
        const anomalies = anomalyData.events || [];

        document.getElementById("total-events").textContent = events.length;
        document.getElementById("total-anomalies").textContent = anomalies.length;

        if (!latestData.error) {
          const statusEl = document.getElementById("latest-status");
          statusEl.textContent = latestData.status || "unknown";
          statusEl.className = "metric " + (latestData.status === "anomaly" ? "bad" : "ok");

          document.getElementById("latest-score").textContent =
            "Score: " + String(latestData.score ?? "--");

          document.getElementById("latest-event").textContent =
            JSON.stringify(latestData, null, 2);
        } else {
          document.getElementById("latest-status").textContent = "No data";
          document.getElementById("latest-status").className = "metric";
          document.getElementById("latest-score").textContent = "Score: --";
          document.getElementById("latest-event").textContent = "No events yet";
        }

        const labels = events.map(e => shortTime(e.timestamp));
        const cpu = events.map(e => e.signals?.cpu_usage ?? 0);
        const mem = events.map(e => e.signals?.memory_usage ?? 0);
        const score = events.map(e => e.score ?? 0);

        cpuChart.data.labels = labels;
        cpuChart.data.datasets[0].data = cpu;
        cpuChart.update();

        memChart.data.labels = labels;
        memChart.data.datasets[0].data = mem;
        memChart.update();

        scoreChart.data.labels = labels;
        scoreChart.data.datasets[0].data = score;
        scoreChart.update();

        relationshipChart.data.datasets[0].data = events
          .filter(e => e.status !== "anomaly")
          .map(e => ({
            x: e.signals?.cpu_usage ?? 0,
            y: e.signals?.memory_usage ?? 0
          }));

        relationshipChart.data.datasets[1].data = events
          .filter(e => e.status === "anomaly")
          .map(e => ({
            x: e.signals?.cpu_usage ?? 0,
            y: e.signals?.memory_usage ?? 0
          }));

        relationshipChart.update();

        const list = document.getElementById("anomaly-list");
        list.innerHTML = "";

        if (!anomalies.length) {
          const li = document.createElement("li");
          li.textContent = "No anomalies yet";
          list.appendChild(li);
        } else {
          anomalies.slice().reverse().forEach(e => {
            const li = document.createElement("li");
            li.textContent = shortTime(e.timestamp) + " score=" + e.score;
            list.appendChild(li);
          });
        }
      } catch (err) {
        document.getElementById("latest-event").textContent =
          "Dashboard error: " + err.message;
      }
    }

    refreshDashboard();
    setInterval(refreshDashboard, 2000);
  </script>
</body>
</html>
