<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neraium Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 16px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .card {
      grid-column: span 12;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
    }

    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }

    @media (max-width: 900px) {
      .span-4, .span-6 {
        grid-column: span 12;
      }
    }

    .metric {
      font-size: 36px;
      font-weight: bold;
      margin: 8px 0;
    }

    .chart-wrap {
      background: #ffffff;
      border-radius: 10px;
      padding: 10px;
    }

    canvas {
      width: 100% !important;
      height: 260px !important;
    }

    pre {
      background: #020617;
      color: #dbeafe;
      border-radius: 10px;
      padding: 12px;
      min-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
    }

    ul {
      max-height: 220px;
      overflow: auto;
      padding-left: 20px;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    .status-ok {
      background-color: #22c55e;
    }

    .status-bad {
      background-color: #ef4444;
    }

    .status-watch {
      background-color: #f59e0b;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pill {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 8px 14px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div>
        <h1>Neraium Dashboard</h1>
        <div class="subtitle">Live telemetry and drift monitoring</div>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div class="pill" id="connection-pill">Simulated feed active</div>
        <button id="refresh-btn" type="button">Refresh now</button>
      </div>
    </div>

    <div class="row">
      <div class="card span-4">
        <h2>Status</h2>
        <div id="latest-status" class="metric">
          <span class="status-indicator status-ok"></span><span id="status-text">Loading...</span>
        </div>
        <div id="latest-score">Score: --</div>
        <div class="muted" id="latest-time">Time: --</div>
      </div>

      <div class="card span-4">
        <h2>Total Events</h2>
        <div id="total-events" class="metric">0</div>
      </div>

      <div class="card span-4">
        <h2>Total Anomalies</h2>
        <div id="total-anomalies" class="metric">0</div>
      </div>
    </div>

    <div class="row">
      <div class="card span-6">
        <h2>CPU Usage</h2>
        <div class="chart-wrap">
          <canvas id="cpuChart"></canvas>
        </div>
      </div>

      <div class="card span-6">
        <h2>Memory Usage</h2>
        <div class="chart-wrap">
          <canvas id="memChart"></canvas>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="card span-6">
        <h2>Score</h2>
        <div class="chart-wrap">
          <canvas id="scoreChart"></canvas>
        </div>
      </div>

      <div class="card span-6">
        <h2>CPU vs Memory Relationship</h2>
        <div class="chart-wrap">
          <canvas id="relationshipChart"></canvas>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="card span-6">
        <h2>Latest Event</h2>
        <pre id="latest-event">Loading...</pre>
      </div>

      <div class="card span-6">
        <h2>Anomaly Events</h2>
        <ul id="anomaly-list"></ul>
      </div>
    </div>
  </div>

  <script>
    const cpuChart = new Chart(document.getElementById("cpuChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "CPU",
          data: [],
          borderWidth: 2,
          borderColor: "#3b82f6",
          backgroundColor: "rgba(59, 130, 246, 0.1)",
          tension: 0.4,
          fill: true
        }]
      },
      options: {
        responsive: true,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100 }
        }
      }
    });

    const memChart = new Chart(document.getElementById("memChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "Memory",
          data: [],
          borderWidth: 2,
          borderColor: "#8b5cf6",
          backgroundColor: "rgba(139, 92, 246, 0.1)",
          tension: 0.4,
          fill: true
        }]
      },
      options: {
        responsive: true,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100 }
        }
      }
    });

    const scoreChart = new Chart(document.getElementById("scoreChart"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: "Score",
          data: [],
          borderWidth: 2,
          borderColor: "#ec4899",
          backgroundColor: "rgba(236, 72, 153, 0.1)",
          tension: 0.4,
          fill: true
        }]
      },
      options: {
        responsive: true,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100 }
        }
      }
    });

    const relationshipChart = new Chart(document.getElementById("relationshipChart"), {
      type: "scatter",
      data: {
        datasets: [
          {
            label: "Normal",
            data: [],
            backgroundColor: "rgba(34, 197, 94, 0.6)",
            borderColor: "#22c55e"
          },
          {
            label: "Anomaly",
            data: [],
            backgroundColor: "rgba(239, 68, 68, 0.6)",
            borderColor: "#ef4444"
          }
        ]
      },
      options: {
        responsive: true,
        animation: false,
        scales: {
          x: {
            min: 0,
            max: 100,
            title: { display: true, text: "CPU %" }
          },
          y: {
            min: 0,
            max: 100,
            title: { display: true, text: "Memory %" }
          }
        }
      }
    });

    let mockEvents = [];

    function generateMockEvent() {
      const cpu = Math.round((20 + Math.random() * 60) * 10) / 10;
      const memory = Math.round((30 + Math.random() * 50) * 10) / 10;
      const score = Math.round((cpu * 0.45 + memory * 0.35 + Math.random() * 20));

      let status = "normal";
      if (score > 80 || cpu > 78 || memory > 82) {
        status = "anomaly";
      } else if (score > 65) {
        status = "watch";
      }

      return {
        timestamp: new Date().toISOString(),
        status,
        score: Math.min(score, 100),
        signals: {
          cpu_usage: cpu,
          memory_usage: memory
        }
      };
    }

    for (let i = 0; i < 15; i++) {
      mockEvents.push(generateMockEvent());
    }

    function shortTime(ts) {
      try {
        return new Date(ts).toLocaleTimeString();
      } catch {
        return ts;
      }
    }

    function updateStatusDisplay(event) {
      const statusEl = document.getElementById("status-text");
      const indicator = document.querySelector(".status-indicator");

      statusEl.textContent = event.status || "unknown";

      if (event.status === "anomaly") {
        indicator.className = "status-indicator status-bad";
      } else if (event.status === "watch") {
        indicator.className = "status-indicator status-watch";
      } else {
        indicator.className = "status-indicator status-ok";
      }

      document.getElementById("latest-score").textContent =
        "Score: " + String(event.score ?? "--");

      document.getElementById("latest-time").textContent =
        "Time: " + shortTime(event.timestamp);
    }

    function refreshDashboard() {
      try {
        if (mockEvents.length > 50) {
          mockEvents.shift();
        }

        mockEvents.push(generateMockEvent());

        const events = mockEvents;
        const anomalies = mockEvents.filter(e => e.status === "anomaly");
        const latestData = mockEvents[mockEvents.length - 1];

        document.getElementById("total-events").textContent = events.length;
        document.getElementById("total-anomalies").textContent = anomalies.length;

        if (latestData) {
          updateStatusDisplay(latestData);
          document.getElementById("latest-event").textContent =
            JSON.stringify(latestData, null, 2);
        } else {
          document.getElementById("status-text").textContent = "No data";
          document.querySelector(".status-indicator").className = "status-indicator";
          document.getElementById("latest-score").textContent = "Score: --";
          document.getElementById("latest-time").textContent = "Time: --";
          document.getElementById("latest-event").textContent = "No events yet";
        }

        const labels = events.map(e => shortTime(e.timestamp));
        const cpu = events.map(e => e.signals?.cpu_usage ?? 0);
        const mem = events.map(e => e.signals?.memory_usage ?? 0);
        const score = events.map(e => e.score ?? 0);

        cpuChart.data.labels = labels;
        cpuChart.data.datasets[0].data = cpu;
        cpuChart.update();

        memChart.data.labels = labels;
        memChart.data.datasets[0].data = mem;
        memChart.update();

        scoreChart.data.labels = labels;
        scoreChart.data.datasets[0].data = score;
        scoreChart.update();

        relationshipChart.data.datasets[0].data = events
          .filter(e => e.status === "normal" || e.status === "watch")
          .map(e => ({
            x: e.signals?.cpu_usage ?? 0,
            y: e.signals?.memory_usage ?? 0
          }));

        relationshipChart.data.datasets[1].data = events
          .filter(e => e.status === "anomaly")
          .map(e => ({
            x: e.signals?.cpu_usage ?? 0,
            y: e.signals?.memory_usage ?? 0
          }));

        relationshipChart.update();

        const list = document.getElementById("anomaly-list");
        list.innerHTML = "";

        if (!anomalies.length) {
          const li = document.createElement("li");
          li.textContent = "No anomalies yet";
          list.appendChild(li);
        } else {
          anomalies.slice().reverse().slice(0, 10).forEach(e => {
            const li = document.createElement("li");
            li.textContent = shortTime(e.timestamp) + "  score=" + e.score;
            list.appendChild(li);
          });
        }
      } catch (err) {
        document.getElementById("latest-event").textContent =
          "Dashboard error: " + err.message;
        console.error(err);
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", refreshDashboard);

    refreshDashboard();
    setInterval(refreshDashboard, 2000);
  </script>
</body>
</html>
