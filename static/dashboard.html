<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neraium Telemetry Test</title>
  <style>
    body { font-family: Arial, sans-serif; background:#08111f; color:#e8f1ff; padding:20px; }
    .card { background:#10203a; border:1px solid #223b63; border-radius:12px; padding:16px; margin-bottom:16px; }
    .big { font-size:32px; font-weight:700; margin-top:8px; }
    pre { background:#06101e; padding:12px; border-radius:8px; overflow:auto; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <div>State</div>
    <div id="systemState" class="big">Loading...</div>
  </div>

  <div class="card">
    <div>Structural Drift</div>
    <div id="driftValue" class="big">Loading...</div>
  </div>

  <div class="card">
    <div>Lead Time</div>
    <div id="leadTimeValue" class="big">Loading...</div>
  </div>

  <div class="card">
    <div>Latest Raw Status</div>
    <pre id="debugStatus">Loading...</pre>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
