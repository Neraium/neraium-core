<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neraium — Systemic Infrastructure</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #08111f;
      color: #e8f1ff;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }
    .hero, .card, .table-card {
      background: #10203a;
      border: 1px solid #223b63;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .hero-state-label, .mini-label {
      color: #b3c8e5;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .hero-state {
      font-size: 84px;
      font-weight: 800;
      line-height: 1;
      margin: 8px 0 12px;
    }
    .state-stable { color: #ffffff; }
    .state-watch { color: #ffd56a; }
    .state-alert { color: #ff6c86; }
    .pill {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid #35537e;
      background: rgba(255,255,255,0.04);
      margin-left: 8px;
    }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    .metric-value {
      font-size: 52px;
      font-weight: 800;
      margin-top: 10px;
      color: #8cf0ff;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    button {
      border: 1px solid #35537e;
      background: rgba(255,255,255,0.04);
      color: #e8f1ff;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 18px;
      cursor: pointer;
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .chart-wrap {
      position: relative;
      height: 280px;
      width: 100%;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #223b63;
      font-size: 14px;
    }
    th {
      color: #9fb4d3;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hidden { display: none; }
    pre {
      background: #08111f;
      color: #dbe8ff;
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
    }
    @media (max-width: 900px) {
      .hero-top, .charts, .metrics { grid-template-columns: 1fr; display: block; }
      .hero-state { font-size: 58px; }
    }
  </style>
</head>

  <div class
